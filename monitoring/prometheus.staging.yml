global:
  scrape_interval:     15s
  evaluation_interval: 30s
  external_labels:
    env: staging

rule_files:
  - "alerts.rules.yml"

# Alertmanager 設定（本番では実際のエンドポイントを設定）
alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # 例: ["alertmanager:9093"]

scrape_configs:
  # ─── Asoview API (SQLite) ──────────────────────────────────────────────────
  - job_name: asoview
    static_configs:
      - targets: ["asoview-staging:3001"]
        labels:
          db: sqlite
          env: staging
    metrics_path: /api/v1/metrics
    scrape_interval: 15s

  # ─── Asoview API (PostgreSQL) ─────────────────────────────────────────────
  - job_name: asoview-pg
    static_configs:
      - targets: ["asoview-staging-pg:3001"]
        labels:
          db: postgres
          env: staging
    metrics_path: /api/v1/metrics
    scrape_interval: 15s

  # ─── Prometheus 自身 ────────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
