name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libsqlite3-dev libcurl4-openssl-dev

      - name: Build schema embed
        run: make schema

      - name: Build & test
        run: make test
        env:
          JWT_SECRET: ci-test-jwt-secret-value-32chars-ok
          ADMIN_KEY: asoview-admin-dev
