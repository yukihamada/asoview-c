name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libsqlite3-dev libcurl4-openssl-dev

      - name: Build & test
        run: make test
        env:
          JWT_SECRET: ci-test-jwt-secret-value-32chars-ok
          ADMIN_KEY: asoview-admin-dev

      - name: Build & test (ASAN)
        run: make test-asan
        env:
          ASAN_OPTIONS: detect_leaks=0
          JWT_SECRET: ci-test-jwt-secret-value-32chars-ok
          ADMIN_KEY: asoview-admin-dev

      - name: Post status badge
        if: always()
        run: |
          echo "### CI Result" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "![CI](https://img.shields.io/badge/build-passing-brightgreen)" >> $GITHUB_STEP_SUMMARY
          else
            echo "![CI](https://img.shields.io/badge/build-failing-red)" >> $GITHUB_STEP_SUMMARY
          fi
