openapi: 3.1.0
info:
  title: asoview-c API
  version: 1.0.0
  description: |
    体験・アクティビティ予約サービスの REST API
    C11 シングルバイナリ（mongoose + cJSON + SQLite3）

    ## 認証
    - **ユーザー**: `Authorization: Bearer <JWT>` (HS256)
    - **管理者**: `X-Admin-Key: <admin-key>`

    ## レート制限
    - 一般エンドポイント: 500 req/min/IP
    - 認証・登録エンドポイント: 60 req/min/IP
    - 超過時: `429 Too Many Requests`

servers:
  - url: http://localhost:3001
    description: ローカル開発
  - url: https://your-domain.example.com
    description: 本番

tags:
  - name: health
    description: サーバー状態
  - name: areas
    description: 地域
  - name: categories
    description: カテゴリ
  - name: venues
    description: 会場・施設
  - name: plans
    description: 体験プラン
  - name: schedules
    description: スケジュール
  - name: reviews
    description: レビュー
  - name: users
    description: ユーザー
  - name: auth
    description: 認証・パスワード管理
  - name: bookings
    description: 予約
  - name: bookmarks
    description: お気に入り
  - name: search
    description: 検索
  - name: webhooks
    description: Stripe Webhook
  - name: admin
    description: 管理者API（X-Admin-Key必須）
  - name: checkout
    description: Stripe Checkout（決済フロー）
  - name: waitlist
    description: ウェイトリスト

paths:
  /api/v1/health:
    get:
      tags: [health]
      summary: サーバー状態確認
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  db: { type: string, example: ok }

  /api/v1/areas:
    get:
      tags: [areas]
      summary: 地域一覧
      responses:
        "200":
          description: 地域リスト（階層構造）
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Area" }

  /api/v1/categories:
    get:
      tags: [categories]
      summary: カテゴリ一覧
      responses:
        "200":
          description: カテゴリリスト（階層構造）
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }

  /api/v1/venues:
    get:
      tags: [venues]
      summary: 会場一覧（ページング対応）
      parameters:
        - name: area_id
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: 会場リスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  venues:
                    type: array
                    items: { $ref: "#/components/schemas/Venue" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /api/v1/venues/{id}:
    get:
      tags: [venues]
      summary: 会場詳細
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: 会場詳細
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Venue" }
        "404":
          description: Not Found

  /api/v1/venues/{id}/plans:
    get:
      tags: [venues, plans]
      summary: 会場のプラン一覧
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: プランリスト
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Plan" }

  /api/v1/plans:
    get:
      tags: [plans]
      summary: プラン一覧（フィルタ・ページング対応）
      parameters:
        - name: category_id
          in: query
          schema: { type: integer }
        - name: area_id
          in: query
          schema: { type: integer }
        - name: date
          in: query
          schema: { type: string, format: date, example: "2026-05-01" }
        - name: adults
          in: query
          schema: { type: integer }
        - name: children
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: プランリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items: { $ref: "#/components/schemas/Plan" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /api/v1/plans/{id}:
    get:
      tags: [plans]
      summary: プラン詳細
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: プラン詳細（価格情報を含む）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plan" }
        "404":
          description: Not Found

  /api/v1/plans/{id}/schedules:
    get:
      tags: [schedules]
      summary: スケジュール一覧
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: スケジュールリスト
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Schedule" }

  /api/v1/plans/{id}/reviews:
    get:
      tags: [reviews]
      summary: プランのレビュー一覧（ページング対応）
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: レビューリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items: { $ref: "#/components/schemas/Review" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /api/v1/users:
    post:
      tags: [users]
      summary: ユーザー登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password]
              properties:
                email: { type: string, format: email }
                name: { type: string }
                phone: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        "201":
          description: 作成されたユーザー
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          description: バリデーションエラー
        "409":
          description: メールアドレス重複

  /api/v1/users/{id}:
    get:
      tags: [users]
      summary: ユーザープロフィール取得
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ユーザー情報
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "404":
          description: Not Found
    patch:
      tags: [users]
      summary: ユーザープロフィール更新
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
      responses:
        "200":
          description: 更新後のユーザー情報
        "401":
          description: 認証エラー
        "403":
          description: 権限エラー（他ユーザーの変更不可）

  /api/v1/users/{id}/bookings:
    get:
      tags: [users, bookings]
      summary: ユーザーの予約一覧
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: 予約リスト
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Booking" }
        "401":
          description: 認証エラー
        "403":
          description: 権限エラー

  /api/v1/users/{id}/bookmarks:
    get:
      tags: [users, bookmarks]
      summary: ユーザーのブックマーク一覧
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ブックマークリスト
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Bookmark" }
        "401":
          description: 認証エラー
        "403":
          description: 権限エラー

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: ログイン → JWT 取得
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: JWT トークン
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: integer }
                  name: { type: string }
                  token: { type: string, description: "アクセストークン（有効期限 1h）" }
                  refresh_token: { type: string, description: "リフレッシュトークン（有効期限 14d）" }
                  message: { type: string }
        "400":
          description: 認証失敗

  /api/v1/auth/change-password:
    patch:
      tags: [auth]
      summary: パスワード変更（ログイン中）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "200":
          description: 変更成功
        "400":
          description: 現在のパスワードが間違っている、または新パスワードが短すぎる
        "401":
          description: 認証エラー

  /api/v1/auth/forgot-password:
    post:
      tags: [auth]
      summary: パスワードリセット要求（メール送信）
      description: |
        登録済みメールアドレスであれば1時間有効なリセットトークンを発行。
        列挙攻撃防止のため、メール存在有無に関わらず200を返す。
        **開発環境**: レスポンスの `reset_token` フィールドにトークンを返す（本番では除去）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: 要求受付（メール送信）
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  reset_token:
                    type: string
                    description: 開発環境のみ返却

  /api/v1/auth/reset-password:
    post:
      tags: [auth]
      summary: パスワードリセット実行
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string, description: forgot-password で取得した32文字トークン }
                new_password: { type: string, minLength: 8 }
      responses:
        "200":
          description: リセット成功
        "400":
          description: トークンが無効・期限切れ・使用済み

  /api/v1/bookings:
    post:
      tags: [bookings]
      summary: 予約作成
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id, schedule_id, participants]
              properties:
                plan_id: { type: integer }
                schedule_id: { type: integer }
                note: { type: string }
                participants:
                  type: array
                  items:
                    type: object
                    required: [participant_type, count]
                    properties:
                      participant_type:
                        type: string
                        enum: [adult, child, senior]
                      count: { type: integer, minimum: 1 }
      responses:
        "201":
          description: 予約作成成功
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: "#/components/schemas/Booking" }
                  - type: object
                    properties:
                      client_secret:
                        type: string
                        description: Stripe PaymentIntent client_secret（STRIPE_SECRET_KEY設定時のみ）
                      stripe_payment_intent_id:
                        type: string
        "400":
          description: バリデーションエラー
        "401":
          description: 認証エラー
        "409":
          description: 定員超過

  /api/v1/bookings/{id}:
    get:
      tags: [bookings]
      summary: 予約詳細
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 予約詳細
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Booking" }
        "401": { description: 認証エラー }
        "403": { description: 他ユーザーの予約 }
        "404": { description: Not Found }

  /api/v1/bookings/{id}/cancel:
    patch:
      tags: [bookings]
      summary: 予約キャンセル
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: キャンセル成功 }
        "400": { description: 既にキャンセル済み }
        "401": { description: 認証エラー }
        "403": { description: 他ユーザーの予約 }
        "404": { description: Not Found }

  /api/v1/reviews:
    post:
      tags: [reviews]
      summary: レビュー投稿（予約済みユーザーのみ）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id, rating]
              properties:
                plan_id: { type: integer }
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string, maxLength: 1000 }
                booking_id: { type: string, format: uuid }
      responses:
        "201": { description: レビュー作成成功 }
        "400": { description: バリデーションエラー }
        "401": { description: 認証エラー }
        "403": { description: 未予約ユーザー }

  /api/v1/reviews/{id}:
    delete:
      tags: [reviews]
      summary: レビュー削除（自分のレビューのみ）
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 削除成功 }
        "401": { description: 認証エラー }
        "403": { description: 他ユーザーのレビュー }
        "404": { description: レビューが存在しない }

  /api/v1/bookmarks:
    post:
      tags: [bookmarks]
      summary: ブックマーク追加
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id]
              properties:
                plan_id: { type: integer }
      responses:
        "201": { description: ブックマーク作成 }
        "401": { description: 認証エラー }
        "404": { description: プランが存在しない }

  /api/v1/bookmarks/{plan_id}:
    delete:
      tags: [bookmarks]
      summary: ブックマーク削除
      security: [{ bearerAuth: [] }]
      parameters:
        - name: plan_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 削除成功 }
        "401": { description: 認証エラー }
        "404": { description: Not Found }

  /api/v1/search:
    get:
      tags: [search]
      summary: プラン全文検索
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: キーワード（タイトル・説明・会場名）
        - name: area_id
          in: query
          schema: { type: integer }
        - name: category_id
          in: query
          schema: { type: integer }
        - name: date
          in: query
          schema: { type: string, format: date }
        - name: adults
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: 検索結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items: { $ref: "#/components/schemas/Plan" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /api/v1/webhooks/stripe:
    post:
      tags: [webhooks]
      summary: Stripe Webhook 受信
      description: |
        `Stripe-Signature` ヘッダーで HMAC-SHA256 署名を検証。
        replay attack 防止のため timestamp は 5 分以内であること。
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Stripe Event オブジェクト
      responses:
        "200": { description: 受信成功 }
        "400": { description: 署名検証失敗 }

  /api/v1/admin/venues:
    get:
      tags: [admin]
      summary: 会場一覧（管理者）
      security: [{ adminKey: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: 全会場リスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  venues: { type: array, items: { $ref: "#/components/schemas/Venue" } }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
        "403": { description: 管理者キーエラー }
    post:
      tags: [admin]
      summary: 会場作成
      security: [{ adminKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, area_id]
              properties:
                name: { type: string }
                description: { type: string }
                area_id: { type: integer }
                address: { type: string }
                latitude: { type: number }
                longitude: { type: number }
                phone: { type: string }
                website: { type: string }
      responses:
        "201": { description: 作成成功 }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/venues/{id}:
    patch:
      tags: [admin]
      summary: 会場更新
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                address: { type: string }
      responses:
        "200": { description: 更新成功 }
        "403": { description: 管理者キーエラー }
    delete:
      tags: [admin]
      summary: 会場削除（カスケード）
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 削除成功 }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/plans:
    get:
      tags: [admin]
      summary: プラン一覧（管理者・非アクティブ含む）
      security: [{ adminKey: [] }]
      parameters:
        - name: is_active
          in: query
          schema: { type: integer, enum: [0, 1] }
          description: フィルタ（未指定=全件）
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: プランリスト
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans: { type: array }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
        "403": { description: 管理者キーエラー }
    post:
      tags: [admin]
      summary: プラン作成
      security: [{ adminKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [venue_id, category_id, title, prices]
              properties:
                venue_id: { type: integer }
                category_id: { type: integer }
                title: { type: string }
                description: { type: string }
                duration_minutes: { type: integer }
                min_participants: { type: integer, default: 1 }
                max_participants: { type: integer }
                min_age: { type: integer }
                prices:
                  type: array
                  items:
                    type: object
                    required: [participant_type, label, price]
                    properties:
                      participant_type: { type: string }
                      label: { type: string }
                      price: { type: integer }
      responses:
        "201": { description: 作成成功 }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/plans/{id}:
    patch:
      tags: [admin]
      summary: プラン更新
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                is_active: { type: boolean }
      responses:
        "200": { description: 更新成功 }
        "403": { description: 管理者キーエラー }
    delete:
      tags: [admin]
      summary: プラン無効化（ソフトデリート）
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 無効化成功 }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/plans/{id}/schedules:
    post:
      tags: [admin, schedules]
      summary: スケジュール追加
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, start_time, capacity]
              properties:
                date: { type: string, format: date }
                start_time: { type: string, example: "09:00" }
                end_time: { type: string, example: "12:00" }
                capacity: { type: integer }
      responses:
        "201": { description: 作成成功 }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/plans/{id}/prices:
    put:
      tags: [admin]
      summary: プラン価格設定（全置換）
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [participant_type, label, price]
                properties:
                  participant_type: { type: string }
                  label: { type: string }
                  price: { type: integer }
      responses:
        "200": { description: 更新成功 }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/schedules/{id}:
    patch:
      tags: [admin, schedules]
      summary: スケジュール更新（容量・日時）
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                capacity: { type: integer, description: "現在の予約数以上である必要あり" }
                date: { type: string, format: date }
                start_time: { type: string, example: "09:00" }
                end_time: { type: string, example: "11:00" }
      responses:
        "200": { description: 更新成功 }
        "400": { description: "capacityが予約数を下回る" }
        "403": { description: 管理者キーエラー }
        "404": { description: スケジュールが存在しない }
    delete:
      tags: [admin, schedules]
      summary: スケジュール削除
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 削除成功 }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/bookings:
    get:
      tags: [admin, bookings]
      summary: 予約一覧（管理者）
      security: [{ adminKey: [] }]
      parameters:
        - name: plan_id
          in: query
          schema: { type: integer }
        - name: user_id
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string, enum: [pending_payment, confirmed, cancelled] }
        - name: date
          in: query
          schema: { type: string, format: date }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: 予約一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Booking" }
                  total: { type: integer }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/reviews:
    get:
      tags: [admin, reviews]
      summary: レビュー一覧（管理者）
      security: [{ adminKey: [] }]
      parameters:
        - name: plan_id
          in: query
          schema: { type: integer }
        - name: rating
          in: query
          schema: { type: integer, minimum: 1, maximum: 5 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: レビュー一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Review" }
                  total: { type: integer }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/reviews/{id}:
    delete:
      tags: [admin, reviews]
      summary: レビュー削除（管理者）
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 削除成功 }
        "403": { description: 管理者キーエラー }
        "404": { description: レビューが存在しない }

  /api/v1/admin/users:
    get:
      tags: [admin, users]
      summary: ユーザー一覧（管理者）
      security: [{ adminKey: [] }]
      parameters:
        - name: email
          in: query
          schema: { type: string }
          description: メールアドレスの部分一致検索
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: ユーザー一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      allOf:
                        - { $ref: "#/components/schemas/User" }
                        - type: object
                          properties:
                            booking_count: { type: integer }
                  total: { type: integer }
        "403": { description: 管理者キーエラー }

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: JWT リフレッシュ（アクセストークン + リフレッシュトークン再発行）
      description: |
        リフレッシュトークンをリクエストボディで渡す。
        発行済みの refresh_token は即座に無効化（ローテーション）される。
        Authorization ヘッダーは不要。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: "ログイン時に発行された refresh_token"
      responses:
        "200":
          description: 新しいアクセストークンとリフレッシュトークンを発行
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, description: "新しいアクセストークン（1h）" }
                  refresh_token: { type: string, description: "新しいリフレッシュトークン（14d）" }
                  message: { type: string }
        "400": { description: "refresh_token が未指定" }
        "401": { description: "無効・期限切れ・または使用済みのリフレッシュトークン" }

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: ログアウト（JWT をブラックリストに追加）
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: ログアウト成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "401": { description: 未認証 }

  /api/v1/checkout/session:
    post:
      tags: [bookings]
      summary: Stripe Checkout Session 作成（¥50,000 固定）
      description: |
        4ページ目の決済フロー用。Stripe Hosted Checkout ページへのリダイレクト URL を返す。
        決済完了後、`success_url` にリダイレクトされる。
        `checkout.session.completed` webhook を受信すると booking の status が `confirmed` に更新される。
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                success_url:
                  type: string
                  format: uri
                  description: 決済完了後のリダイレクト先（省略時は /payment/success）
                cancel_url:
                  type: string
                  format: uri
                  description: キャンセル時のリダイレクト先（省略時は /payment/cancel）
                metadata:
                  type: object
                  description: Stripe metadata に追加するキーバリューペア
      responses:
        "200":
          description: Checkout Session 作成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id: { type: string, example: "cs_test_..." }
                  url: { type: string, format: uri, description: Stripe Checkout ページ URL }
                  amount: { type: integer, example: 50000 }
        "400": { description: 不正な URL（SSRF 防止） }
        "401": { description: 未認証 }
        "502": { description: Stripe API エラー }

  /api/v1/waitlist:
    post:
      tags: [bookings]
      summary: ウェイトリスト登録
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [schedule_id]
              properties:
                schedule_id: { type: integer }
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  user_id: { type: integer }
                  schedule_id: { type: integer }
                  position: { type: integer, description: 現在の順位 }
                  message: { type: string }
        "400": { description: schedule_id 欠落 }
        "401": { description: 未認証 }
        "404": { description: スケジュールが存在しない }
        "409": { description: 既に登録済み }

  /api/v1/waitlist/schedule/{schedule_id}:
    get:
      tags: [bookings]
      summary: ウェイトリスト一覧取得
      parameters:
        - name: schedule_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ウェイトリスト一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule_id: { type: integer }
                  waitlist:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        user_id: { type: integer }
                        user_name: { type: string }
                        schedule_id: { type: integer }
                        position: { type: integer }
                        created_at: { type: string, format: date-time }

  /api/v1/waitlist/{id}:
    delete:
      tags: [bookings]
      summary: ウェイトリストから削除（自分のエントリのみ）
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 削除成功 }
        "401": { description: 未認証 }
        "404": { description: 見つからない（他人のエントリ含む） }

  /api/v1/admin/upload-url:
    post:
      tags: [admin]
      summary: S3 Presigned URL 取得（画像アップロード用）
      description: AWS S3 / 互換ストレージの署名付き PUT URL を返す。`AWS_S3_BUCKET` 等が未設定の場合は 503。
      security: [{ adminAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filename, content_type]
              properties:
                filename: { type: string, example: "photo.jpg" }
                content_type: { type: string, example: "image/jpeg" }
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url: { type: string, format: uri }
                  public_url: { type: string, format: uri }
                  expires_in: { type: integer, description: 有効秒数 }
        "400": { description: パラメータ不足 }
        "403": { description: 管理者キーエラー }
        "503": { description: S3 設定未完了 }

  /api/v1/metrics:
    get:
      tags: [admin]
      summary: Prometheus メトリクス
      description: Prometheus フォーマットのメトリクスを返す。`/metrics` エンドポイントとしてスクレイプ可能。
      responses:
        "200":
          description: Prometheus テキストフォーマット
          content:
            text/plain:
              schema:
                type: string

  # ── iCal エクスポート ──────────────────────────────────────────────────────

  /api/v1/bookings/{id}/ical:
    get:
      tags: [bookings]
      summary: 予約を iCal (.ics) としてエクスポート（RFC 5545）
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: iCal ファイル
          content:
            text/calendar:
              schema: { type: string }
        "400": { description: キャンセル済みの予約 }
        "401": { description: 未認証 }
        "403": { description: 他人の予約 }
        "404": { description: 予約が見つからない }

  # ── クーポン ───────────────────────────────────────────────────────────────

  /api/v1/coupons/{code}:
    get:
      tags: [bookings]
      summary: クーポンコード検証
      description: クーポンの有効性・割引内容を返す。認証不要。
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string, example: "SUMMER10" }
      responses:
        "200":
          description: クーポン情報
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  code: { type: string }
                  description: { type: string, nullable: true }
                  discount_type: { type: string, enum: [percent, fixed] }
                  discount_value: { type: number }
                  expires_at: { type: string, format: date-time, nullable: true }
        "404": { description: 無効・期限切れ・使用上限超過 }

  # ── プラン空き状況 ─────────────────────────────────────────────────────────

  /api/v1/plans/{id}/availability:
    get:
      tags: [plans]
      summary: プランの空き日程一覧（カレンダー表示用）
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: from
          in: query
          schema: { type: string, format: date }
          description: "検索開始日（デフォルト: 今日）"
        - name: to
          in: query
          schema: { type: string, format: date }
          description: "検索終了日（デフォルト: 今日 +30 日）"
        - name: adults
          in: query
          schema: { type: integer, default: 1 }
          description: 最低必要空き数
      responses:
        "200":
          description: 空きスケジュール一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan_id: { type: integer }
                  from: { type: string, format: date }
                  to: { type: string, format: date }
                  adults: { type: integer }
                  schedules:
                    type: array
                    items: { $ref: "#/components/schemas/Schedule" }
        "404": { description: プランが見つからない }

  # ── 2FA TOTP (ユーザー) ────────────────────────────────────────────────────

  /api/v1/auth/2fa/setup:
    post:
      tags: [auth]
      summary: 2FA セットアップ — シークレット生成
      description: TOTP シークレットと otpauth:// URI を返す。まだ有効化はしない。
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: シークレットと QR URI
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string, description: Base32 エンコードシークレット }
                  qr_uri: { type: string, description: "otpauth://totp/... URI" }
        "401": { description: 未認証 }

  /api/v1/auth/2fa/enable:
    post:
      tags: [auth]
      summary: 2FA 有効化 — TOTP コード確認
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, example: "123456", description: 6 桁 TOTP コード }
      responses:
        "200": { description: 2FA 有効化成功 }
        "400": { description: コードが不正または未セットアップ }
        "401": { description: 未認証 }

  /api/v1/auth/2fa/verify:
    post:
      tags: [auth]
      summary: 2FA 認証 — temp_token と TOTP コードで JWT を取得
      description: |
        2FA 有効ユーザーのログイン後、`/auth/login` が返す `temp_token` と
        TOTP コードを送信して正式な JWT を取得する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [temp_token, code]
              properties:
                temp_token: { type: string, description: login で返された一時トークン }
                code: { type: string, example: "123456" }
      responses:
        "200":
          description: 認証成功 — JWT 返却
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user_id: { type: integer }
        "401": { description: temp_token が無効またはコード不正 }

  # ── 管理者 2FA ─────────────────────────────────────────────────────────────

  /api/v1/admin/2fa/setup:
    get:
      tags: [admin]
      summary: 管理者 TOTP セットアップ（初回のみ）
      description: |
        `ADMIN_TOTP_SECRET` が未設定の場合は新しいシークレットを生成して返す。
        設定済みの場合は `{"status":"already_configured"}` を返す。
        取得したシークレットを `.env` の `ADMIN_TOTP_SECRET` に設定して再起動すること。
      security: [{ adminKey: [] }]
      responses:
        "200":
          description: セットアップ情報または設定済み通知
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      totp_secret: { type: string }
                      qr_uri: { type: string }
                      instructions: { type: string }
                  - type: object
                    properties:
                      status: { type: string, enum: [already_configured] }
                      message: { type: string }
        "403": { description: 管理者キーエラー }

  # ── 管理者: 予約返金 ───────────────────────────────────────────────────────

  /api/v1/admin/bookings/{id}/refund:
    post:
      tags: [admin, bookings]
      summary: 予約を返金（Stripe）
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: 返金成功 }
        "400": { description: 既にキャンセル済みまたは返金不可 }
        "403": { description: 管理者キーエラー }
        "404": { description: 予約が見つからない }
        "502": { description: Stripe API エラー }

  # ── 管理者: DB バックアップ ────────────────────────────────────────────────

  /api/v1/admin/backup:
    get:
      tags: [admin]
      summary: SQLite DB バックアップダウンロード
      description: SQLite の `.backup` API でスナップショットを取得してバイナリ返却。
      security: [{ adminKey: [] }]
      responses:
        "200":
          description: SQLite DB バイナリ
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "403": { description: 管理者キーエラー }
        "500": { description: バックアップ失敗 }

  # ── 管理者: クーポン CRUD ──────────────────────────────────────────────────

  /api/v1/admin/coupons:
    get:
      tags: [admin]
      summary: クーポン一覧
      security: [{ adminKey: [] }]
      responses:
        "200":
          description: クーポン一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  coupons:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        code: { type: string }
                        description: { type: string, nullable: true }
                        discount_type: { type: string, enum: [percent, fixed] }
                        discount_value: { type: number }
                        max_uses: { type: integer, nullable: true }
                        used_count: { type: integer }
                        expires_at: { type: string, format: date-time, nullable: true }
                        is_active: { type: boolean }
        "403": { description: 管理者キーエラー }
    post:
      tags: [admin]
      summary: クーポン作成
      security: [{ adminKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, discount_type, discount_value]
              properties:
                code: { type: string, example: "SUMMER10" }
                description: { type: string }
                discount_type: { type: string, enum: [percent, fixed] }
                discount_value: { type: number, example: 10 }
                max_uses: { type: integer, nullable: true }
                expires_at: { type: string, format: date-time, nullable: true }
      responses:
        "201": { description: 作成成功 }
        "400": { description: パラメータ不足または重複コード }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/coupons/{id}:
    delete:
      tags: [admin]
      summary: クーポン削除
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 削除成功 }
        "403": { description: 管理者キーエラー }
        "404": { description: クーポンが見つからない }

  # ── 管理者: Webhook エンドポイント CRUD ───────────────────────────────────

  /api/v1/admin/webhooks:
    get:
      tags: [admin]
      summary: Webhook エンドポイント一覧
      security: [{ adminKey: [] }]
      responses:
        "200":
          description: Webhook 一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        url: { type: string, format: uri }
                        events: { type: string, description: カンマ区切りイベント名 }
                        is_active: { type: boolean }
        "403": { description: 管理者キーエラー }
    post:
      tags: [admin]
      summary: Webhook エンドポイント登録
      security: [{ adminKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                events: { type: string, example: "booking.created,booking.cancelled" }
                secret: { type: string, description: HMAC 署名用シークレット }
      responses:
        "201": { description: 登録成功 }
        "400": { description: パラメータ不足 }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/webhooks/{id}:
    delete:
      tags: [admin]
      summary: Webhook エンドポイント削除
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 削除成功 }
        "403": { description: 管理者キーエラー }
        "404": { description: 見つからない }

  # ── 管理者: プラン画像 CRUD ────────────────────────────────────────────────

  /api/v1/admin/plans/{id}/images:
    get:
      tags: [admin, plans]
      summary: プラン画像一覧
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: 画像一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        url: { type: string, format: uri }
                        sort_order: { type: integer }
        "403": { description: 管理者キーエラー }
        "404": { description: プランが見つからない }
    post:
      tags: [admin, plans]
      summary: プラン画像追加
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                sort_order: { type: integer, default: 0 }
      responses:
        "201": { description: 追加成功 }
        "400": { description: URL が必要 }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/plan-images/{id}:
    delete:
      tags: [admin, plans]
      summary: プラン画像削除
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: 削除成功 }
        "403": { description: 管理者キーエラー }
        "404": { description: 見つからない }

  # ── 管理者: 一括スケジュール生成 ──────────────────────────────────────────

  /api/v1/admin/plans/{id}/schedules/bulk:
    post:
      tags: [admin, schedules]
      summary: スケジュール一括生成
      description: |
        日付範囲と曜日マスクを指定して複数スケジュールを一括作成。
        例: 毎週土日 9:00〜12:00 を 3 ヶ月分まとめて生成。
      security: [{ adminKey: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to, weekdays, start_time, end_time, capacity]
              properties:
                from: { type: string, format: date }
                to: { type: string, format: date }
                weekdays:
                  type: array
                  items: { type: integer, minimum: 0, maximum: 6 }
                  description: "0=日, 1=月, ..., 6=土"
                start_time: { type: string, example: "09:00" }
                end_time: { type: string, example: "12:00" }
                capacity: { type: integer }
      responses:
        "200":
          description: 生成結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  created: { type: integer, description: 生成件数 }
                  skipped: { type: integer, description: 重複スキップ件数 }
        "400": { description: パラメータ不足 }
        "403": { description: 管理者キーエラー }

  # ── 管理者: 売上レポート ───────────────────────────────────────────────────

  /api/v1/admin/reports/sales:
    get:
      tags: [admin]
      summary: 売上レポート CSV ダウンロード
      security: [{ adminKey: [] }]
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date }
          description: "開始日（デフォルト: 30 日前）"
        - name: to
          in: query
          schema: { type: string, format: date }
          description: "終了日（デフォルト: 今日）"
      responses:
        "200":
          description: CSV ファイル
          content:
            text/csv:
              schema: { type: string }
        "403": { description: 管理者キーエラー }

  # ── 管理者: 監査ログ ───────────────────────────────────────────────────────

  /api/v1/admin/audit-logs:
    get:
      tags: [admin]
      summary: 監査ログ一覧
      security: [{ adminKey: [] }]
      parameters:
        - name: actor
          in: query
          schema: { type: string }
          description: 操作者フィルター（IP または user_id）
        - name: action
          in: query
          schema: { type: string }
          description: 操作種別フィルター
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: 監査ログ一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        actor: { type: string }
                        action: { type: string }
                        target: { type: string, nullable: true }
                        detail: { type: string, nullable: true }
                        created_at: { type: string, format: date-time }
        "403": { description: 管理者キーエラー }

  # ── 管理者: ダッシュボード ─────────────────────────────────────────────────

  /api/v1/admin/dashboard:
    get:
      tags: [admin]
      summary: 管理ダッシュボード統計
      security: [{ adminKey: [] }]
      responses:
        "200":
          description: ダッシュボード統計
          content:
            application/json:
              schema:
                type: object
                properties:
                  venues: { type: integer }
                  plans: { type: integer }
                  users: { type: integer }
                  bookings_total: { type: integer }
                  bookings_confirmed: { type: integer }
                  revenue_total: { type: integer }
                  reviews_total: { type: integer }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/tenants:
    get:
      tags: [admin]
      summary: テナント一覧
      security: [{ adminKey: [] }]
      responses:
        "200":
          description: テナント一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
        "403": { description: 管理者キーエラー }
    post:
      tags: [admin]
      summary: テナント作成
      security: [{ adminKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, name]
              properties:
                slug:
                  type: string
                  description: "URL 用の識別子（英数字・ハイフン）"
                name:
                  type: string
                  description: "テナント表示名"
                plan_limit:
                  type: integer
                  default: 100
                  description: "プラン登録上限数"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  slug: { type: string }
                  name: { type: string }
                  api_key: { type: string, description: "自動生成された API キー（X-Tenant-ID ヘッダーで使用）" }
                  plan_limit: { type: integer }
                  is_active: { type: integer }
                  created_at: { type: string, format: date-time }
        "400": { description: "必須フィールド不足" }
        "409": { description: "slug が既に使用済み" }
        "403": { description: 管理者キーエラー }

  /api/v1/admin/tenants/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      tags: [admin]
      summary: テナント詳細取得
      security: [{ adminKey: [] }]
      responses:
        "200":
          description: テナント詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        "404": { description: テナントが存在しない }
        "403": { description: 管理者キーエラー }
    patch:
      tags: [admin]
      summary: テナント更新
      security: [{ adminKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                plan_limit: { type: integer }
                is_active: { type: integer, enum: [0, 1] }
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        "404": { description: テナントが存在しない }
        "403": { description: 管理者キーエラー }
    delete:
      tags: [admin]
      summary: テナント削除
      security: [{ adminKey: [] }]
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        "404": { description: テナントが存在しない }
        "403": { description: 管理者キーエラー }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
    adminAuth:
      type: apiKey
      in: header
      name: X-Admin-Key

  schemas:
    Area:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        level: { type: integer, description: "0=地方, 1=都道府県, 2=市区" }
        parent_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        icon: { type: string, nullable: true }
        parent_id: { type: integer, nullable: true }

    Venue:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        area_id: { type: integer }
        area_name: { type: string }
        address: { type: string, nullable: true }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        phone: { type: string, nullable: true }
        website: { type: string, nullable: true }
        review_count: { type: integer }
        review_avg: { type: number }
        created_at: { type: string, format: date-time }

    Plan:
      type: object
      properties:
        id: { type: integer }
        venue_id: { type: integer }
        venue_name: { type: string }
        category_id: { type: integer }
        category_name: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        duration_minutes: { type: integer, nullable: true }
        min_participants: { type: integer }
        max_participants: { type: integer, nullable: true }
        min_age: { type: integer, nullable: true }
        images: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        is_active: { type: boolean }
        prices:
          type: array
          items: { $ref: "#/components/schemas/Price" }
        created_at: { type: string, format: date-time }

    Price:
      type: object
      properties:
        id: { type: integer }
        participant_type: { type: string, enum: [adult, child, senior] }
        label: { type: string, example: 大人 }
        price: { type: integer, description: 円 }

    Schedule:
      type: object
      properties:
        id: { type: integer }
        plan_id: { type: integer }
        date: { type: string, format: date }
        start_time: { type: string, example: "09:00" }
        end_time: { type: string, nullable: true }
        capacity: { type: integer }
        booked_count: { type: integer }
        available: { type: integer }

    Booking:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: integer }
        plan_id: { type: integer }
        plan_title: { type: string }
        schedule_id: { type: integer }
        schedule_date: { type: string, format: date }
        schedule_start_time: { type: string }
        status:
          type: string
          enum: [pending_payment, confirmed, cancelled]
        total_price: { type: integer }
        note: { type: string, nullable: true }
        participants:
          type: array
          items:
            type: object
            properties:
              participant_type: { type: string }
              label: { type: string }
              count: { type: integer }
              unit_price: { type: integer }
              subtotal: { type: integer }
        created_at: { type: string, format: date-time }

    Review:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        user_name: { type: string, nullable: true }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        name: { type: string }
        phone: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Bookmark:
      type: object
      properties:
        id: { type: integer }
        plan_id: { type: integer }
        plan_title: { type: string }
        duration_minutes: { type: integer, nullable: true }
        venue_name: { type: string }
        created_at: { type: string, format: date-time }

    Error:
      type: object
      properties:
        error: { type: string }

    Tenant:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string, description: "URL 用の識別子（X-Tenant-ID ヘッダー値）" }
        name: { type: string }
        api_key: { type: string, description: "テナント API キー（作成時のみ返却）" }
        plan_limit: { type: integer }
        is_active: { type: integer, enum: [0, 1] }
        created_at: { type: string, format: date-time }
